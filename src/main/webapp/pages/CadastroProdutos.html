<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css">
        <link rel="stylesheet" href="../css/color.css">
        <link rel="stylesheet" href="../css/cadastroProdutos.css">
        <title>Stockfree | Cadastro (Produto)</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header">
            <h1 id="tituloCadastro"> StockFree</h1>
            <nav id="menu">
                <ul class="menu-lista">
                    <li> <a href="/pages/projeto.html" >Inicio</a></li>
                    <li> <a href="#" >Gerenciamento</a></li>
                    <li> <a href="/pages/cadastro.html" class="btn-menu" >Cadastro</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id="form-container">
                <form action="../cadastroProdutos" method="POST" id="formCadastro">
                    <div class="linha-form">
                        <label> Codigo de Barras</label>
                        <input type="text" name="codigoBarras" required/>
                    </div>
                    <div class="grupo-form">
                        <label> Nome do Produto</label>
                        <input type="text" name="nomeProduto" required/>
                    </div>
                    <div class="linha-form">
                        <label> Fabricante</label>
                        <input type="text" name="fabricante" required/>
                    </div>
                    <div class="grupo-form">
                        <label> Marca</label>
                        <input type="text" name="marca" required/>
                    </div>
                    <div class="linha-form">
                        <label> Data de Fabricação</label>
                        <input type="date" name="dataFabricacao" required/>
                    </div>
                    <div class="grupo-form">
                        <label> Data de Vencimento</label>
                        <input type="date" name="dataVencimento" required/>
                    </div>
                    <div class="linha-form">
                        <label> Quantidade</label>
                        <input type="number" name="quantidade" required/>
                    </div>
                    <div class="grupo-form">
                        <label> Valor Unitário</label>
                        <input type="number" name="valor" required/>
                    </div>
                    <div class="linha-form">
                        <div class="grupo-form full">
                            <label>Total</label>
                            <input type="number" name="total" required/>
                        </div>
                    </div>
                    <div class="acces-form">
                        <button type="submit" class="btn-salvar">Salvar</button>
                        <a href="projeto.html" class="btn-cancelar">Cancelar</a>
                    </div>
                </form>
            </section>
        </main>
        <script src="../js/cadastroProdutos.js"></script>
    </body>
</html>
